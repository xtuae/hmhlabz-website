document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

       <a href=\"./index.html\" class=\"mono text-ink/45 hover:text-terra\">Insight<\u002Fa>\n        <span class=\"text-ink/25\">/<\u002Fspan>\n        <span class=\"mono text-terra\">Field Notes<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HEADER -->\n    <header class=\"px-6 md:px-10 lg:px-14 pt-8 pb-14 sm:pb-20 border-b border-ink/12\">\n      <div class=\"max-w-[68ch]\">\n        <h1 class=\"font-sans font-bold text-ink tracking-[-0.03em] leading-[1.0]\" style=\"font-size: clamp(40px, 6.4vw, 84px);\">\n          Why most legal-tech AI pilots <span class=\"frauncesItalic text-terra\">stall<\u002Fspan> before month three.\n        <\u002Fh1>\n        <p class=\"mt-8 sm:mt-10 font-serif italic text-ink/65 leading-[1.4]\" style=\"font-size: clamp(20px, 2vw, 26px);\">\n          Three patterns we keep seeing — overscoped pilots, no clear owner on the firm side, and unclear \"done.\" A field-tested anatomy of where AI rollouts quietly die.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"mt-14 sm:mt-16 grid grid-cols-2 md:grid-cols-4 gap-6 sm:gap-10 max-w-4xl\">\n        <div>\n          <div class=\"mono text-ink/40 mb-2\">Author<\u002Fdiv>\n          <div class=\"flex items-center gap-3\">\n            <span class=\"w-9 h-9 rounded-full bg-ink text-paper flex items-center justify-center font-serif italic text-[15px]\">N<\u002Fspan>\n            <div class=\"leading-tight\">\n              <div class=\"text-[14px] font-medium\">Naveen Hari<\u002Fdiv>\n              <div class=\"text-[12px] text-ink/55\">Partner<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"mono text-ink/40 mb-2\">Published<\u002Fdiv>\n          <div class=\"text-[14px]\">Mar 14, 2026<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"mono text-ink/40 mb-2\">Read time<\u002Fdiv>\n          <div class=\"text-[14px]\">8 minutes<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"mono text-ink/40 mb-2\">Tag<\u002Fdiv>\n          <div class=\"text-[14px] text-terra\">Field Notes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- COVER -->\n    <div class=\"px-6 md:px-10 lg:px-14 pt-12 sm:pt-16\">\n      <div class=\"relative rounded-2xl overflow-hidden border border-ink/10 bg-cream aspect-[16/8] max-w-6xl mx-auto\">\n        <svg viewBox=\"0 0 1200 600\" preserveAspectRatio=\"xMidYMid slice\" class=\"absolute inset-0 w-full h-full\">\n          <defs>\n            <radialGradient id=\"cov\" cx=\"35%\" cy=\"30%\"><stop offset=\"0%\" stop-color=\"#F4F1EA\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#D9CFB7\"><\u002Fstop><\u002FradialGradient>\n          <\u002Fdefs>\n          <rect width=\"1200\" height=\"600\" fill=\"url(#cov)\"><\u002Frect>\n          <!-- stacked legal files -->\n          <g transform=\"translate(120 100) rotate(-3)\">\n            <rect width=\"300\" height=\"380\" fill=\"#EDE6D3\" stroke=\"#161513\" stroke-width=\".8\"><\u002Frect>\n            <rect x=\"30\" y=\"40\" width=\"200\" height=\"4\" fill=\"#161513\" opacity=\".7\"><\u002Frect>\n            <rect x=\"30\" y=\"60\" width=\"240\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"72\" width=\"220\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"84\" width=\"180\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"120\" width=\"240\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"132\" width=\"200\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"144\" width=\"220\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"180\" width=\"100\" height=\"20\" fill=\"#C2410C\"><\u002Frect>\n            <rect x=\"30\" y=\"220\" width=\"240\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"232\" width=\"220\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"244\" width=\"180\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n          <\u002Fg>\n          <g transform=\"translate(400 80) rotate(4)\">\n            <rect width=\"320\" height=\"400\" fill=\"#F4F1EA\" stroke=\"#161513\" stroke-width=\".8\"><\u002Frect>\n            <rect x=\"30\" y=\"40\" width=\"120\" height=\"3\" fill=\"#C2410C\"><\u002Frect>\n            <rect x=\"30\" y=\"60\" width=\"260\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"72\" width=\"240\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"84\" width=\"200\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <circle cx=\"270\" cy=\"350\" r=\"22\" fill=\"none\" stroke=\"#C2410C\" stroke-width=\"2\"><\u002Fcircle>\n            <path d=\"M258 350 L268 360 L284 340\" fill=\"none\" stroke=\"#C2410C\" stroke-width=\"2\"><\u002Fpath>\n            <rect x=\"30\" y=\"130\" width=\"260\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"142\" width=\"220\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"170\" width=\"80\" height=\"14\" fill=\"#161513\" opacity=\".15\"><\u002Frect>\n            <rect x=\"30\" y=\"195\" width=\"260\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n            <rect x=\"30\" y=\"207\" width=\"240\" height=\"2\" fill=\"#161513\" opacity=\".25\"><\u002Frect>\n          <\u002Fg>\n          <!-- coffee + pen -->\n          <g transform=\"translate(800 280)\">\n            <ellipse cx=\"80\" cy=\"0\" rx=\"78\" ry=\"14\" fill=\"#161513\"><\u002Fellipse>\n            <path d=\"M4 0 L12 140 Q80 152 148 140 L156 0 Z\" fill=\"#EDE6D3\" stroke=\"#161513\" stroke-width=\".8\"><\u002Fpath>\n            <ellipse cx=\"80\" cy=\"0\" rx=\"68\" ry=\"10\" fill=\"#5a3a2b\"><\u002Fellipse>\n          <\u002Fg>\n          <g transform=\"translate(960 200) rotate(20)\">\n            <rect width=\"200\" height=\"10\" fill=\"#161513\"><\u002Frect>\n            <polygon points=\"200,0 220,5 200,10\" fill=\"#C2410C\"><\u002Fpolygon>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"mt-4 mono text-ink/40 text-center\">Fig. 01 — Stacked intake files, mid-engagement<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- BODY + TOC -->\n    <section class=\"px-6 md:px-10 lg:px-14 py-20 sm:py-28\">\n      <div class=\"grid grid-cols-12 gap-8 lg:gap-12\">\n        <!-- TOC -->\n        <aside class=\"hidden lg:block col-span-3\">\n          <div class=\"sticky top-[110px]\">\n            <div class=\"mono text-ink/45 mb-5\">In this piece<\u002Fdiv>\n            <nav id=\"toc\" class=\"flex flex-col\">\n              <a href=\"#why-pilots-die\" class=\"toc-link\" data-target=\"why-pilots-die\">01 — Why pilots die quietly<\u002Fa>\n              <a href=\"#overscoped\" class=\"toc-link\" data-target=\"overscoped\">02 — Overscoped from week one<\u002Fa>\n              <a href=\"#owner\" class=\"toc-link\" data-target=\"owner\">03 — No owner on the firm side<\u002Fa>\n              <a href=\"#done\" class=\"toc-link\" data-target=\"done\">04 — \"Done\" was never defined<\u002Fa>\n              <a href=\"#fix\" class=\"toc-link\" data-target=\"fix\">05 — How we actually fix it<\u002Fa>\n              <a href=\"#takeaway\" class=\"toc-link\" data-target=\"takeaway\">06 — Takeaway<\u002Fa>\n            <\u002Fnav>\n\n            <div class=\"mt-10 pt-6 border-t border-ink/12\">\n              <div class=\"mono text-ink/45 mb-4\">Share<\u002Fdiv>\n              <div class=\"flex gap-2\">\n                <button class=\"w-10 h-10 rounded-full border border-ink/15 hover:border-ink hover:bg-ink hover:text-paper transition-colors text-[13px]\" title=\"Twitter\">𝕏<\u002Fbutton>\n                <button class=\"w-10 h-10 rounded-full border border-ink/15 hover:border-ink hover:bg-ink hover:text-paper transition-colors text-[13px]\" title=\"LinkedIn\">in<\u002Fbutton>\n                <button id=\"copyLink\" class=\"w-10 h-10 rounded-full border border-ink/15 hover:border-ink hover:bg-ink hover:text-paper transition-colors text-[13px]\" title=\"Copy link\">⌗<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Faside>\n\n        <!-- ARTICLE BODY -->\n        <article class=\"col-span-12 lg:col-span-9 prose max-w-[68ch]\">\n          <section id=\"why-pilots-die\">\n            <p>We've sat in on a dozen legal-tech AI rollouts over the last eighteen months. Different firms, different vendors, different jurisdictions. The same three things kill them every time. None of them are technical. All of them are predictable.<\u002Fp>\n\n            <p>You can spot a stalled pilot from across the room. The Slack channel goes quiet. The weekly check-in becomes fortnightly. Someone uses the word \"phase two\" without irony. Six weeks later, the system is still running — nobody's used it in a month.<\u002Fp>\n          <\u002Fsection>\n\n          <section id=\"overscoped\">\n            <h2>Overscoped from week one<\u002Fh2>\n            <p>The single most common failure mode: the pilot tries to do <strong>too much<\u002Fstrong> at once. A vendor pitches a \"comprehensive intake automation,\" the firm signs because it sounds impressive, and three weeks in the team realises they're rebuilding their entire workflow before they've shipped anything useful.<\u002Fp>\n\n            <p>What we look for instead is the <em class=\"frauncesItalic\">smallest wedge that still matters<\u002Fem>. One workflow. One team. One measurable hour saved per case. If the pilot can't be described in a single sentence — \"this replaces the way Sarah's team triages new matters\" — the scope is wrong.<\u002Fp>\n\n            <h3>Symptoms we watch for<\u002Fh3>\n            <ul>\n              <li>The success criteria list has more than four bullets.<\u002Fli>\n              <li>Stakeholders disagree about which workflow is being automated.<\u002Fli>\n              <li>The vendor's demo touches three systems the firm doesn't actually use.<\u002Fli>\n              <li>\"We'll figure that out in phase two\" appears in any meeting note.<\u002Fli>\n            <\u002Ful>\n          <\u002Fsection>\n\n          <!-- PULL QUOTE -->\n          <figure class=\"my-16 -mx-2 sm:mx-0\">\n            <div class=\"relative bg-cream rounded-2xl border border-ink/10 px-10 sm:px-14 py-12 sm:py-16\">\n              <span class=\"absolute left-0 top-0 bottom-0 w-1.5 bg-terra rounded-l-2xl\"><\u002Fspan>\n              <span class=\"font-serif italic text-terra block leading-none mb-4\" style=\"font-size: 64px;\">“<\u002Fspan>\n              <blockquote class=\"font-serif italic text-ink leading-[1.2] tracking-[-0.01em]\" style=\"font-size: clamp(24px, 2.6vw, 32px);\">\n                If the pilot can't be described in a single sentence, the scope is wrong. Phase two is where pilots go to die.\n              <\u002Fblockquote>\n            <\u002Fdiv>\n          <\u002Ffigure>\n\n          <section id=\"owner\">\n            <h2>No owner on the firm side<\u002Fh2>\n            <p>The second pattern: nobody at the firm is accountable for the pilot's outcome. The partner who signed the contract sees the rollout as a vendor problem. The IT team is supposed to \"coordinate.\" The ops manager has been told to \"help where possible.\" Within six weeks, the system is everyone's responsibility and therefore no one's.<\u002Fp>\n\n            <p>Our rule: every engagement names one person on the client side who owns the outcome. They aren't necessarily the most senior person, but they have the authority to make calls. They get a weekly hour with us. They have a number — hours saved per week, cases triaged per day, errors caught before filing — and we report against it every Friday.<\u002Fp>\n          <\u002Fsection>\n\n          <section id=\"done\">\n            <h2>\"Done\" was never defined<\u002Fh2>\n            <p>The third killer is more subtle. The pilot ships, the team uses it for a few weeks, and then — nothing. Was the pilot successful? Should the firm extend? Was it a waste of three months? Nobody can answer, because <strong>nobody agreed up front what success looked like.<\u002Fstrong><\u002Fp>\n\n            <p>This is the cheapest problem to solve and the one most engagements skip. Before we touch any code, we write two short paragraphs: what this engagement will look like at week four, and what it will look like at week twelve. The numbers are conservative on purpose. If we hit them, the firm extends. If we don't, we say so, and we either fix the system or recommend killing it.<\u002Fp>\n\n            <figure class=\"my-14\">\n              <div class=\"rounded-2xl border border-ink/12 bg-paper overflow-hidden\">\n                <div class=\"grid grid-cols-3 border-b border-ink/12\">\n                  <div class=\"px-6 py-4 border-r border-ink/12\">\n                    <div class=\"mono text-ink/40 mb-2\">Wk 04 target<\u002Fdiv>\n                    <div class=\"font-sans font-semibold text-[20px]\">3 hrs saved / lawyer / wk<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"px-6 py-4 border-r border-ink/12\">\n                    <div class=\"mono text-ink/40 mb-2\">Wk 12 target<\u002Fdiv>\n                    <div class=\"font-sans font-semibold text-[20px]\">12 hrs saved / lawyer / wk<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"px-6 py-4\">\n                    <div class=\"mono text-ink/40 mb-2\">Kill criteria<\u002Fdiv>\n                    <div class=\"font-sans font-semibold text-[20px] text-terra\">&lt; 4 hrs at wk 08<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"px-6 py-4 mono text-ink/45\">Fig. 02 — A two-paragraph engagement memo, rendered as a table<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Ffigure>\n          <\u002Fsection>\n\n          <section id=\"fix\">\n            <h2>How we actually fix it<\u002Fh2>\n            <p>None of this is novel. Most of it is in every consulting handbook ever written. The reason it doesn't happen is that AI pilots get sold as <em class=\"frauncesItalic\">technology<\u002Fem> projects, when they're actually <em class=\"frauncesItalic\">operational change<\u002Fem> projects with a technology component.<\u002Fp>\n\n            <p>The technology is the easy part. The change management is the hard part. We start every engagement with a two-week diagnostic before we propose anything. The output isn't a deck — it's a written, scored roadmap. <a href=\"../HMH Labz v2.html#services\">Tier 01 · Wedge<\u002Fa> exists for exactly this reason.<\u002Fp>\n          <\u002Fsection>\n\n          <section id=\"takeaway\">\n            <h2>Takeaway<\u002Fh2>\n            <p>If you're about to start a legal-tech AI pilot, write down three things before you sign anything:<\u002Fp>\n            <ul>\n              <li>The single sentence that describes what this system replaces.<\u002Fli>\n              <li>The name of one person at your firm who owns the outcome.<\u002Fli>\n              <li>The number that defines success at week four, week eight, and week twelve.<\u002Fli>\n            <\u002Ful>\n            <p>If you can't write all three in twenty minutes, the pilot isn't ready. That's not a reason to abandon it — it's a reason to spend two weeks getting clear before you spend six months building.<\u002Fp>\n          <\u002Fsection>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- AUTHOR BIO -->\n    <section class=\"px-6 md:px-10 lg:px-14 pb-24\">\n      <div class=\"max-w-4xl mx-auto bg-cream rounded-2xl border border-ink/10 overflow-hidden\">\n        <
